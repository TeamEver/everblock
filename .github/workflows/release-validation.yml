name: Release Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Validate release payload
        run: php .github/scripts/validate-release.php
